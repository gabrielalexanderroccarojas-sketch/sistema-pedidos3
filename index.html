<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAPI COMIDA - Pedidos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            color: white;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            background: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        .tab.active { background: #ff6b35; color: white; }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
        }
        .menu-section, .cart-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
        }
        .categorias {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .btn-categoria {
            padding: 8px 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
        .btn-categoria.active { background: #ff6b35; color: white; }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }
        .producto {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 1px solid #e0e0e0;
        }
        .producto h3 { margin-bottom: 5px; }
        .precio { color: #ff6b35; font-size: 22px; font-weight: bold; margin: 10px 0; }
        .btn-agregar {
            background: #ff6b35;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
        }
        .carrito-items { max-height: 400px; overflow-y: auto; }
        .carrito-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .btn-cantidad {
            background: #f0f0f0;
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
        }
        .btn-eliminar {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
        }
        .total {
            font-size: 20px;
            font-weight: bold;
            text-align: right;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #ff6b35;
        }
        .btn-pagar, .btn-vaciar {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 16px;
        }
        .btn-pagar { background: #28a745; color: white; }
        .btn-vaciar { background: #6c757d; color: white; }
        .admin-panel { background: white; border-radius: 20px; padding: 20px; margin-top: 20px; }
        .pedido-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #ff6b35;
        }
        .badge-nuevo {
            background: #28a745;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .datos-pago { background: #f8f9fa; padding: 15px; border-radius: 10px; margin: 15px 0; text-align: left; }
        .btn-copiar, .btn-whatsapp {
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            margin: 5px;
        }
        .btn-copiar { background: #28a745; color: white; }
        .btn-whatsapp { background: #25D366; color: white; }
        .close { float: right; font-size: 24px; cursor: pointer; }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            z-index: 1000;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🍔 PAPI COMIDA</h1>
        <p>🇻🇪 ¡El mejor sabor venezolano!</p>
    </div>
    <div class="tabs">
        <button class="tab active" onclick="cambiarTab('cliente')">🛒 HACER PEDIDO</button>
        <button class="tab" onclick="cambiarTab('admin')">📊 ADMINISTRADOR</button>
    </div>
    <div id="vista-cliente">
        <div class="main-grid">
            <div class="menu-section">
                <h2>📋 MENÚ</h2>
                <div class="categorias" id="categorias"></div>
                <div class="menu-grid" id="menu"></div>
            </div>
            <div class="cart-section">
                <h2>🛒 TU PEDIDO</h2>
                <div class="carrito-items" id="carrito-items"></div>
                <div id="total" class="total"></div>
                <button class="btn-pagar" onclick="finalizarPedido()">✅ LISTO PARA PAGAR</button>
                <button class="btn-vaciar" onclick="vaciarCarrito()">🗑️ Vaciar</button>
            </div>
        </div>
    </div>
    <div id="vista-admin" style="display:none">
        <div class="admin-panel">
            <h2>📊 REGISTRO DE PEDIDOS</h2>
            <div id="lista-pedidos"></div>
        </div>
    </div>
</div>
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="cerrarModal()">&times;</span>
        <h3>📋 RESUMEN</h3>
        <div id="resumen-pedido"></div>
        <div class="datos-pago">
            <h4>💸 DATOS PARA PAGAR</h4>
            <p>📱 Pago Móvil: 04168897555</p>
            <p>🆔 Cédula: V-11338126</p>
            <p>🏦 Banco: Banco de Venezuela</p>
            <p>💰 Total: $<span id="modal-total"></span></p>
        </div>
        <button class="btn-copiar" onclick="copiarDatos()">📋 Copiar Datos</button>
        <button class="btn-whatsapp" onclick="abrirWhatsApp()">📱 Enviar WhatsApp</button>
    </div>
</div>
<script>
const MENU = {
    comida: [
        { id: "1", nombre: "🍔 PAPI BURGUER", precio: 8, descripcion: "Doble carne, queso, tocineta" },
        { id: "2", nombre: "🍟 PAPAS LOQUERAS", precio: 4, descripcion: "Papas con salsa especial" },
        { id: "3", nombre: "🍗 PATACON", precio: 7, descripcion: "Patacón con carne mechada" },
        { id: "4", nombre: "🌭 PERRO CALIENTE", precio: 5, descripcion: "Salchicha, papas, queso" },
        { id: "8", nombre: "🌮 AREPA REINA", precio: 6, descripcion: "Arepa con pollo, aguacate" }
    ],
    bebidas: [
        { id: "5", nombre: "🥤 MALTA POLAR", precio: 2, descripcion: "Bien fría" },
        { id: "6", nombre: "🥤 FRESCO COLA", precio: 1.5, descripcion: "1.5 litros" }
    ],
    postres: [
        { id: "7", nombre: "🍰 QUESILLO", precio: 3, descripcion: "Casero" }
    ]
};
let carrito = [];
let categoriaActiva = "comida";
let pedidos = [];

function mostrarCategorias() {
    const div = document.getElementById('categorias');
    const cats = ['comida', 'bebidas', 'postres'];
    const nombres = { comida: '🍔 Comida', bebidas: '🥤 Bebidas', postres: '🍰 Postres' };
    div.innerHTML = '';
    cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = `btn-categoria ${categoriaActiva === cat ? 'active' : ''}`;
        btn.textContent = nombres[cat];
        btn.onclick = () => { categoriaActiva = cat; mostrarCategorias(); mostrarMenu(); };
        div.appendChild(btn);
    });
}
function mostrarMenu() {
    const div = document.getElementById('menu');
    div.innerHTML = '';
    MENU[categoriaActiva].forEach(item => {
        const prod = document.createElement('div');
        prod.className = 'producto';
        prod.innerHTML = `
            <h3>${item.nombre}</h3>
            <div class="precio">$${item.precio}</div>
            <button class="btn-agregar" onclick="agregarAlCarrito('${item.id}', '${item.nombre}', ${item.precio})">➕ Agregar</button>
        `;
        div.appendChild(prod);
    });
}
function agregarAlCarrito(id, nombre, precio) {
    const existente = carrito.find(i => i.id === id);
    if (existente) existente.cantidad++;
    else carrito.push({ id, nombre, precio, cantidad: 1 });
    actualizarCarrito();
    mostrarToast(`✅ ${nombre} agregada`);
}
function actualizarCarrito() {
    const div = document.getElementById('carrito-items');
    const totalDiv = document.getElementById('total');
    if (carrito.length === 0) {
        div.innerHTML = '<p style="text-align:center">📭 Carrito vacío</p>';
        totalDiv.innerHTML = '';
        return;
    }
    let html = '', total = 0;
    carrito.forEach((item, i) => {
        const subtotal = item.precio * item.cantidad;
        total += subtotal;
        html += `
            <div class="carrito-item">
                <div><strong>${item.nombre}</strong><br><small>$${item.precio} c/u</small></div>
                <div>
                    <button class="btn-cantidad" onclick="cambiarCantidad(${i}, -1)">-</button>
                    <span style="margin:0 10px">${item.cantidad}</span>
                    <button class="btn-cantidad" onclick="cambiarCantidad(${i}, 1)">+</button>
                    <button class="btn-eliminar" onclick="eliminarDelCarrito(${i})">✖</button>
                </div>
            </div>
        `;
    });
    div.innerHTML = html;
    totalDiv.innerHTML = `💰 TOTAL: $${total}`;
}
function cambiarCantidad(idx, delta) {
    if (carrito[idx].cantidad + delta <= 0) eliminarDelCarrito(idx);
    else { carrito[idx].cantidad += delta; actualizarCarrito(); }
}
function eliminarDelCarrito(idx) { carrito.splice(idx, 1); actualizarCarrito(); mostrarToast('🗑️ Eliminado'); }
function vaciarCarrito() { if (confirm('¿Vaciar carrito?')) { carrito = []; actualizarCarrito(); } }
function finalizarPedido() {
    if (carrito.length === 0) { alert('❌ Carrito vacío'); return; }
    let total = carrito.reduce((s, i) => s + (i.precio * i.cantidad), 0);
    let html = '';
    carrito.forEach(i => html += `<p>• ${i.cantidad}x ${i.nombre} - $${i.precio * i.cantidad}</p>`);
    document.getElementById('resumen-pedido').innerHTML = html;
    document.getElementById('modal-total').innerText = total;
    document.getElementById('modal').style.display = 'flex';
}
function cerrarModal() { document.getElementById('modal').style.display = 'none'; }
function copiarDatos() {
    let total = carrito.reduce((s, i) => s + (i.precio * i.cantidad), 0);
    let texto = `📋 RESUMEN DE PEDIDO\n\n`;
    carrito.forEach(i => texto += `• ${i.cantidad}x ${i.nombre} - $${i.precio * i.cantidad}\n`);
    texto += `\n💰 TOTAL: $${total}\n\n💸 DATOS PARA PAGAR:\n📱 Pago Móvil: 04168897555\n🆔 Cédula: V-11338126\n🏦 Banco: Banco de Venezuela`;
    navigator.clipboard.writeText(texto);
    guardarPedido(total);
    mostrarToast('✅ Datos copiados');
    cerrarModal();
    vaciarCarrito();
}
function abrirWhatsApp() {
    let total = carrito.reduce((s, i) => s + (i.precio * i.cantidad), 0);
    let texto = `📋 *RESUMEN DE PEDIDO*%0A`;
    carrito.forEach(i => texto += `• ${i.cantidad}x ${i.nombre} - $${i.precio * i.cantidad}%0A`);
    texto += `%0A💰 *TOTAL: $${total}*%0A%0A💸 *DATOS PARA PAGAR*%0A📱 Pago Móvil: 04168897555%0A🆔 Cédula: V-11338126%0A🏦 Banco: Banco de Venezuela`;
    window.open(`https://wa.me/584168897555?text=${texto}`, '_blank');
    guardarPedido(total);
    cerrarModal();
    vaciarCarrito();
}
function guardarPedido(total) {
    const pedido = {
        productos: carrito.map(i => ({ nombre: i.nombre, cantidad: i.cantidad, subtotal: i.precio * i.cantidad })),
        total: total
    };
    fetch('/api/pedido', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(pedido)
    }).then(() => mostrarToast('✅ Pedido registrado')).catch(() => mostrarToast('❌ Error'));
}
function cargarPedidos() {
    fetch('/api/pedidos').then(r => r.json()).then(data => {
        pedidos = data;
        const div = document.getElementById('lista-pedidos');
        if (pedidos.length === 0) { div.innerHTML = '<p>📭 No hay pedidos</p>'; return; }
        let html = '';
        pedidos.forEach(p => {
            html += `<div class="pedido-card"><div class="badge-nuevo">NUEVO</div><div>📅 ${p.fecha}</div>`;
            p.productos.forEach(prod => html += `<div>• ${prod.cantidad}x ${prod.nombre} - $${prod.subtotal}</div>`);
            html += `<div><strong>💰 TOTAL: $${p.total}</strong></div></div>`;
        });
        div.innerHTML = html;
    });
}
function cambiarTab(tab) {
    document.getElementById('vista-cliente').style.display = tab === 'cliente' ? 'block' : 'none';
    document.getElementById('vista-admin').style.display = tab === 'admin' ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (tab === 'cliente' && i === 0) || (tab === 'admin' && i === 1)));
    if (tab === 'admin') cargarPedidos();
}
function mostrarToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}
mostrarCategorias();
mostrarMenu();
</script>
</body>
</html>
